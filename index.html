<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晚上做雙人瑜珈好嗎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            position: relative;
        }
        
        h1 {
            color: #ff6b6b;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .gif-wrapper {
            display: inline-block;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        
        .gif-wrapper.shake {
            animation: shake 0.5s;
        }
        
        .gif-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
            transition: all 0.3s ease;
        }
        
        .gif-image.smaller-1 {
            transform: scale(0.7);
        }
        
        .gif-image.smaller-2 {
            transform: scale(0.5);
        }
        
        .gif-image.smaller-3 {
            transform: scale(0.35);
        }
        
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-5px, 5px) rotate(-2deg); }
            50% { transform: translate(5px, -5px) rotate(2deg); }
            75% { transform: translate(-5px, -5px) rotate(-2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        
        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-yes {
            background: #4ecdc4;
            color: white;
        }
        
        .btn-yes:hover {
            background: #45b7af;
            transform: scale(1.05);
        }
        
        .btn-no {
            background: #ff6b6b;
            color: white;
            position: relative;
        }
        
        .btn-no:hover {
            background: #ee5a5a;
        }
        
        .btn-no.shrunk-1 {
            transform: scale(0.85);
        }
        
        .btn-no.shrunk-2 {
            transform: scale(0.7);
        }
        
        .btn-no.shrunk-3 {
            transform: scale(0.55);
        }
        
        .btn-no.running {
            position: fixed;
            z-index: 1000;
            animation: runEverywhere 0.8s infinite;
            cursor: none;
        }
        
        @keyframes runEverywhere {
            0% { 
                transform: translate(0, 0) scale(0.5); 
            }
            25% { 
                transform: translate(100px, -150px) scale(0.5); 
            }
            50% { 
                transform: translate(-200px, 200px) scale(0.5); 
            }
            75% { 
                transform: translate(-150px, -100px) scale(0.5); 
            }
            100% { 
                transform: translate(200px, 100px) scale(0.5); 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>晚上做雙人瑜珈好嗎</h1>
        
        <div class="gif-wrapper" id="gifWrapper">
            <!-- 🔴 在這裡放你的第一張 GIF（預設圖片） -->
            <img src="gif1-default.gif" alt="雙人瑜珈 GIF" class="gif-image" id="mainGif">
        </div>
        
        <div class="button-container">
            <button class="btn btn-yes" onclick="showYesMessage()">好啊 老公 我願意</button>
            <button class="btn btn-no" id="noBtn" onclick="handleNoClick()">下次吧老公</button>
        </div>
    </div>

    <script>
        let noClickCount = 0;
        const maxClicks = 3;
        
        // 🔴 在這裡改變你的 GIF 圖片名稱（按順序）
        const gifImages = [
            "gif1-default.gif",    // 第 0 次：預設圖片
            "gif2-first.gif",      // 第 1 次：第一次按後
            "gif3-second.gif"      // 第 2 次：第二次按後
        ];
        
        // 🔴 在這裡改按鈕的文字（可以自訂）
         const noTexts = [
            "下次吧老公",        // 第 1 次顯示
            "老婆再考慮一下 給你一杯奶茶",      // 第 2 次顯示
            "不要啦~~~~"         // 第 3 次開始跑動時
        ];
        
        function handleNoClick() {
            noClickCount++;
            const btn = document.getElementById('noBtn');
            const gif = document.getElementById('mainGif');
            const gifWrapper = document.getElementById('gifWrapper');
            
            // 切換 GIF 圖片
            if (noClickCount < gifImages.length) {
                gif.src = gifImages[noClickCount];
            }
            
            // 改變按鈕文字
            if (noClickCount <= noTexts.length) {
                btn.textContent = noTexts[noClickCount - 1];
            }
            
            // 圖片變小 + 晃動效果
            gifWrapper.classList.remove('shake');
            gif.classList.remove('smaller-1', 'smaller-2', 'smaller-3');
            
            if (noClickCount === 1) {
                gif.classList.add('smaller-1');
                gifWrapper.classList.add('shake');
                btn.classList.add('shrunk-1');
            } else if (noClickCount === 2) {
                gif.classList.add('smaller-2');
                gifWrapper.classList.add('shake');
                btn.classList.add('shrunk-2');
            } else if (noClickCount >= 3) {
                gif.classList.add('smaller-3');
                gifWrapper.classList.add('shake');
                btn.classList.add('shrunk-3');
                btn.classList.add('running');
            }
            
            // 觸發晃動動畫
            setTimeout(() => {
                gifWrapper.classList.add('shake');
            }, 100);
        }
        
function showYesMessage() {
    const yourLineID = "boy2218";  // 🔴 不用加 @
    const message = "好啊 老公 我願意 ❤️";
    
    alert(`❤️ 太棒了！\n\n請點擊下方按鈕打開我的 LINE：\n\nhttps://line.me/ti/p/boy2218\n\n然後傳這個訊息給我：\n\n"${message}"\n\n我等你！💕`);
    
    window.open(`https://line.me/ti/p/boy2218`, '_blank');
}
    </script>
</body>
</html>
